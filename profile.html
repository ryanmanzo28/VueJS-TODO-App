<!doctype html>
<html lang="en">
  <head>
        <link rel="stylesheet" href="/src/assets/main.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="profile-text">Profile</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: #f4f7fb;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      .profile-content {
        display: flex;
        justify-content: center;
        padding: 32px 24px;
      }
      .profile-page { text-align: center; width: 100%; }

      /* logged-out */
      .logged-out-msg { color: #667589; margin-bottom: 16px; }

      /* card */
      .profile-card {
        display: inline-block;
        background: #fff;
        border-radius: 16px;
        padding: 32px 40px;
        box-shadow: 0 4px 24px rgba(25,34,53,0.1);
        min-width: 280px;
        max-width: 400px;
        width: 100%;
      }

      /* avatar bubble */
      .profile-bubble {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: #1f3966;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 14px;
        overflow: hidden;
        border: 3px solid #d9e4f3;
      }
      .profile-bubble img { width: 100%; height: 100%; object-fit: cover; }
      .profile-initials { color: #fff; font-size: 1.6rem; font-weight: 700; }

      .profile-username { margin: 0 0 6px; font-size: 1.25rem; color: #1d2735; }

      .upload-label {
        display: inline-block;
        font-size: 0.8rem;
        color: #3370d6;
        cursor: pointer;
        margin-bottom: 20px;
      }
      .upload-label input { display: none; }

      /* tasks */
      .profile-tasks {
        text-align: left;
        margin-top: 4px;
        border-top: 1px solid #e4ebf5;
        padding-top: 16px;
      }
      .profile-tasks h3 {
        margin: 0 0 10px;
        font-size: 0.8rem;
        color: #667589;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      #task-list {
        list-style: none;
        padding: 0;
        margin: 0 0 20px;
        display: grid;
        gap: 6px;
      }
      #task-list li {
        padding: 7px 10px;
        border-radius: 8px;
        background: #f4f7fb;
        font-size: 0.9rem;
        color: #1d2735;
      }
      #task-list li.task-done { text-decoration: line-through; color: #7b8697; }
      #task-list li.no-tasks { color: #667589; background: transparent; text-align: center; }
    </style>

  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="/" class="logo">HydraCor</a>
        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li><a href="/profile.html">Profile</a></li>
          <li><a href="/logout.html">Logout</a></li>
        </ul>
      </div>
    </nav>
    <div class="profile-content">
    <main class="profile-page"></main>
    </div>
  </body>
</html>
<script>
    const profilePage = document.querySelector('.profile-page');
    const isLoggedIn = Boolean(localStorage.getItem('username') && localStorage.getItem('password'));

    if (!isLoggedIn) {
        profilePage.innerHTML = `
            <p class="logged-out-msg">You must be logged in to see your profile.</p>
            <button id="login-button">Login</button>
        `;
        document.getElementById('login-button').addEventListener('click', () => {
            window.location.href = '/login.html';
        });
    } else {
        const username = localStorage.getItem('username');
        const pic = localStorage.getItem('profilePicture');
        const initials = username.slice(0, 2).toUpperCase();

        profilePage.innerHTML = `
            <div class="profile-card">
                <div class="profile-bubble">
                    ${pic
                        ? `<img src="${pic}" alt="Profile picture">`
                        : `<span class="profile-initials">${initials}</span>`
                    }
                </div>
                <h2 class="profile-username">${username}</h2>
                <label class="upload-label">
                    📷 Change photo
                    <input type="file" id="profile-picture" accept="image/*">
                </label>
                <div class="profile-tasks">
                    <h3>Current Tasks</h3>
                    <ul id="task-list"><li>Loading…</li></ul>
                </div>
                <button id="logout-button">Logout</button>
            </div>
        `;

        document.getElementById('profile-picture').addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    localStorage.setItem('profilePicture', ev.target.result);
                    location.reload();
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        fetch(`/api/tasks?user=${encodeURIComponent(username)}`)
            .then(r => r.json())
            .then(tasks => {
                const list = document.getElementById('task-list');
                if (!tasks.length) {
                    list.innerHTML = '<li class="no-tasks">No tasks yet.</li>';
                } else {
                    list.innerHTML = tasks
                        .map(t => `<li class="${t.completed ? 'task-done' : ''}">${t.text}</li>`)
                        .join('');
                }
            })
            .catch(() => {
                document.getElementById('task-list').innerHTML = '<li class="no-tasks">Could not load tasks.</li>';
            });

        document.getElementById('logout-button').addEventListener('click', () => {
            window.location.href = '/logout.html';
        });
    }
</script>
