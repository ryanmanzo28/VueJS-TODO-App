<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f4f7fb;
      }
    </style>

  </head>
  <body>
    <main class="profile-page">
      <h1>Profile Page</h1>
      
    </main>
  </body>
</html>
<script> 
    if (username) {
        document.querySelector('.profile-page').innerHTML += `<p>Welcome, ${username}!</p>`;
    } else {
        document.querySelector('.profile-page').innerHTML += `<label for="username">Enter your username:</label>
        <input type="text" id="username" name="username">
        <button id="save-username">Save</button>`;

    }
    if (profilePicture) {
        document.querySelector('.profile-page').innerHTML += `<img src="${profilePicture}" alt="Profile Picture" style="width: 100px; height: 100px; border-radius: 50%;">`;
    } else {
        document.querySelector('.profile-page').innerHTML += `<label for="profile-picture">Upload a profile picture:</label>
        <input type="file" id="profile-picture" name="profile-picture" accept="image/*">
        <button id="save-profile-picture">Save</button>`;
    }
    document.getElementById('save-username')?.addEventListener('click', () => {
        const usernameInput = document.getElementById('username');
        if (usernameInput.value) {
            localStorage.setItem('username', usernameInput.value);
            location.reload();
        }
    });
    document.getElementById('save-profile-picture')?.addEventListener('click', () => {
        const profilePictureInput = document.getElementById('profile-picture');
        if (profilePictureInput.files.length > 0) {
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('profilePicture', e.target.result);
                location.reload();
            };
            reader.readAsDataURL(profilePictureInput.files[0]);
        }
    });
    if (username || password) {
        document.querySelector('.profile-page').innerHTML += `<button id="logout">Logout</button>`;
        document.getElementById('logout').addEventListener('click', () => {
            localStorage.removeItem('username');
            localStorage.removeItem('profilePicture');
            location.reload();
        });
    }
    
</script>
