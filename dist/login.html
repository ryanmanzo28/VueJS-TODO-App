<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #bbcee8;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      .login-page {
        text-align: center;
        padding: 32px 20px;
      }
      #login-form {
        margin-top: 12px;
      }
    </style>
    <link rel="stylesheet" href="/assets/main-3e9d3d47.css">
  </head>
  <body>
    <main class="login-page">
      <h1 id="loginpagemessage">Login Page</h1>
      <form id="login-form">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        <button type="submit">Login</button>
      </form>
    </main>

    <script>
      const isLoggedIn = Boolean(localStorage.getItem('username') && localStorage.getItem('password'));

      if (isLoggedIn) {
        alert('You are already logged in, redirecting to profile page.');
        window.location.href = '/profile.html';
      }

      document.getElementById('login-form').addEventListener('submit', (event) => {
        event.preventDefault();

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          return;
        }

        localStorage.setItem('username', username);
        localStorage.setItem('password', password);
        alert('Login successful! Redirecting to profile page...');
        window.location.href = '/profile.html';
      });
    </script>
  </body>
</html>
